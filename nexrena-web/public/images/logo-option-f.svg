<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-labelledby="titleF">
  <title id="titleF">Nexrena Logo - Geometric Isometric Prism</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400&amp;family=DM+Mono:wght@400&amp;display=swap');
      .text-nex { font-family: 'Cormorant Garamond', serif; font-size: 130px; font-weight: 400; fill: #FDFCFA; letter-spacing: -0.02em; }
      .text-rena { font-family: 'Cormorant Garamond', serif; font-size: 130px; font-weight: 400; fill: #C9A96E; letter-spacing: -0.02em; }
      .tagline { font-family: 'DM Mono', monospace; font-size: 14px; fill: #7A8A9E; letter-spacing: 0.35em; text-transform: uppercase; }
    </style>
  </defs>
  
  <rect width="1200" height="300" fill="#0C0F12"/>
  
  <g transform="translate(190, 150)">
    <!-- Isometric Cube / Core Structure -->
    <!-- Top Face -->
    <polygon points="0,-70 60,-35 0,0 -60,-35" fill="#E8D5B0" opacity="0.15"/>
    <polygon points="0,-70 60,-35 0,0 -60,-35" fill="none" stroke="#E8D5B0" stroke-width="1.5"/>
    
    <!-- Left Face -->
    <polygon points="-60,-35 0,0 0,70 -60,35" fill="#C9A96E" opacity="0.25"/>
    <polygon points="-60,-35 0,0 0,70 -60,35" fill="none" stroke="#C9A96E" stroke-width="1.5"/>
    
    <!-- Right Face -->
    <polygon points="60,-35 0,0 0,70 60,35" fill="#9B7D4E" opacity="0.1"/>
    <polygon points="60,-35 0,0 0,70 60,35" fill="none" stroke="#9B7D4E" stroke-width="1.5"/>
    
    <!-- Central Pillar -->
    <line x1="0" y1="-30" x2="0" y2="40" stroke="#FDFCFA" stroke-width="2"/>
    <circle cx="0" cy="-30" r="3" fill="#FDFCFA"/>
  </g>
  
  <text x="360" y="175">
    <tspan class="text-nex">Nex</tspan><tspan class="text-rena">rena</tspan>
  </text>
  <text x="366" y="235" class="tagline">Engineered Solutions</text>
</svg>
