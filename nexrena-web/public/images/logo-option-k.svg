<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-labelledby="titleK">
  <title id="titleK">Nexrena Logo - Globe House Wireframe</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400&amp;family=DM+Mono:wght@400&amp;display=swap');
      .text-nex { font-family: 'Cormorant Garamond', serif; font-size: 130px; font-weight: 400; fill: #FDFCFA; letter-spacing: -0.02em; }
      .text-rena { font-family: 'Cormorant Garamond', serif; font-size: 130px; font-weight: 400; fill: #C9A96E; letter-spacing: -0.02em; }
      .tagline { font-family: 'DM Mono', monospace; font-size: 14px; fill: #7A8A9E; letter-spacing: 0.35em; text-transform: uppercase; }
    </style>
  </defs>
  
  <rect width="1200" height="300" fill="#0C0F12"/>
  
  <g transform="translate(190, 150)">
    <!-- Base globe rings -->
    <circle cx="0" cy="0" r="75" fill="none" stroke="#2C3444" stroke-width="1"/>
    <ellipse cx="0" cy="0" rx="75" ry="30" fill="none" stroke="#E8D5B0" stroke-width="1.2" opacity="0.6"/>
    <ellipse cx="0" cy="0" rx="30" ry="75" fill="none" stroke="#E8D5B0" stroke-width="1.2" opacity="0.6"/>
    
    <!-- House structure integrated into the sphere -->
    <!-- Roof -->
    <path d="M -50 -10 L 0 -60 L 50 -10" fill="none" stroke="#C9A96E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Walls -->
    <path d="M -40 -10 V 45" fill="none" stroke="#C9A96E" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M 40 -10 V 45" fill="none" stroke="#C9A96E" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Foundation -->
    <path d="M -60 45 L 60 45" fill="none" stroke="#9B7D4E" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Central node -->
    <circle cx="0" cy="-10" r="3" fill="#FDFCFA"/>
    <line x1="0" y1="-60" x2="0" y2="45" stroke="#9B7D4E" stroke-width="1" stroke-dasharray="2 3"/>
  </g>
  
  <text x="360" y="175">
    <tspan class="text-nex">Nex</tspan><tspan class="text-rena">rena</tspan>
  </text>
  <text x="366" y="235" class="tagline">Global Infrastructure</text>
</svg>
