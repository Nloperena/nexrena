<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-labelledby="titleK1">
  <title id="titleK1">Nexrena Logo - Globe House Seamless</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400&amp;family=DM+Mono:wght@400&amp;display=swap');
      .text-nex { font-family: 'Cormorant Garamond', serif; font-size: 130px; font-weight: 400; fill: #FDFCFA; letter-spacing: -0.02em; }
      .text-rena { font-family: 'Cormorant Garamond', serif; font-size: 130px; font-weight: 400; fill: #C9A96E; letter-spacing: -0.02em; }
      .tagline { font-family: 'DM Mono', monospace; font-size: 14px; fill: #7A8A9E; letter-spacing: 0.35em; text-transform: uppercase; }
    </style>
  </defs>
  
  <rect width="1200" height="300" fill="#0C0F12"/>
  
  <g transform="translate(190, 150)">
    <!-- Base globe outline with roof cut out -->
    <path d="M -50 -55 A 75 75 0 1 0 50 -55" fill="none" stroke="#2C3444" stroke-width="1.5"/>
    
    <!-- Longitude/Latitude arcs -->
    <ellipse cx="0" cy="0" rx="75" ry="35" fill="none" stroke="#E8D5B0" stroke-width="1" opacity="0.4"/>
    
    <!-- House integrated exactly with globe circumference -->
    <path d="M -75 0 L 0 -75 L 75 0" fill="none" stroke="#C9A96E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- House walls curving into the globe -->
    <path d="M -45 28 V -45" fill="none" stroke="#9B7D4E" stroke-width="2" stroke-linecap="round"/>
    <path d="M 45 28 V -45" fill="none" stroke="#9B7D4E" stroke-width="2" stroke-linecap="round"/>
    <path d="M -45 28 C -30 45, 30 45, 45 28" fill="none" stroke="#C9A96E" stroke-width="2.5" stroke-linecap="round"/>
    
    <circle cx="0" cy="0" r="3" fill="#FDFCFA"/>
    <line x1="0" y1="-75" x2="0" y2="-20" stroke="#E8D5B0" stroke-width="1" stroke-dasharray="2 3"/>
  </g>
  
  <text x="360" y="175">
    <tspan class="text-nex">Nex</tspan><tspan class="text-rena">rena</tspan>
  </text>
  <text x="366" y="235" class="tagline">Global Infrastructure</text>
</svg>
