      <animate attributeName="opacity" values="0.8; 0" dur="2s" begin="1.2s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="12" fill="#050507" stroke="#c9a050" stroke-width="1.5" />
    <circle cx="0" cy="0" r="3.1" fill="#f0d080" class="node-glow" />
  </g>
  
  <g transform="translate(540, 235)">
