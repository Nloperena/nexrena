<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" style="background-color: #050507; width: 100%; height: auto;">
  <defs>
    <radialGradient id="bgGlow" cx="55%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1e1205" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#050507" stop-opacity="0"/>
    </radialGradient>
    
    <linearGradient id="dropFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#b89354" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#b89354" stop-opacity="0"/>
    </linearGradient>
    
    <linearGradient id="mainLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a2a10"/>
      <stop offset="30%" stop-color="#b89354"/>
      <stop offset="70%" stop-color="#f5d796"/>
      <stop offset="100%" stop-color="#7a5c2d"/>
    </linearGradient>

    <linearGradient id="topFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#050507" stop-opacity="1"/>
      <stop offset="100%" stop-color="#050507" stop-opacity="0"/>
    </linearGradient>

    <path id="cometTrack" d="M 80,320 C 119,296 164,246 210,240 C 256,234 266,303 310,290 C 354,277 384,186 430,175 C 476,164 498,249 540,235 C 582,221 620,131 640,105" fill="none" />

    <style>
      .node-glow { filter: drop-shadow(0 0 4px rgba(240, 208, 128, 0.5)); }
      .head-glow { filter: drop-shadow(0 0 5px #ffffff); }
    </style>
  </defs>

  <rect width="680" height="400" fill="url(#bgGlow)" />
  
  <circle cx="80" cy="120" r="35" fill="none" stroke="#b89354" opacity="0.04" stroke-width="1" />
  <circle cx="420" cy="60" r="75" fill="none" stroke="#b89354" opacity="0.04" stroke-width="1" />
  <circle cx="260" cy="-30" r="90" fill="none" stroke="#b89354" opacity="0.04" stroke-width="1" />

  <path d="M0,340 H680 M0,358 H680 M0,376 H680 M0,394 H680" stroke="#5a461e" stroke-width="0.5" opacity="0.12" />

  <path d="M80,326 V420 M210,248 V420 M310,296 V420 M430,184 V420 M540,242 V420 M640,116 V420" stroke="url(#dropFade)" stroke-width="1" />

  <path d="M 80,320 Q 195,330 310,290 T 540,235" stroke="#7a5c2d" stroke-width="1" stroke-dasharray="3 8" opacity="0.2" fill="none" />
  <path d="M 210,240 Q 320,180 430,175 T 640,105" stroke="#7a5c2d" stroke-width="1" stroke-dasharray="3 8" opacity="0.2" fill="none" />

  <use href="#cometTrack" stroke="#f5d796" stroke-width="14" opacity="0.07" stroke-linejoin="round" stroke-linecap="round" />
  <use href="#cometTrack" stroke="#3a2a10" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" />
  <use href="#cometTrack" stroke="url(#mainLine)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" />

