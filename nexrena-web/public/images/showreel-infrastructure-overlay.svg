<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" style="width: 100%; height: auto; display: block;">
  <defs>
    <linearGradient id="waveFill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b89354" stop-opacity="0" />
      <stop offset="40%" stop-color="#c9a050" stop-opacity="0.08" />
      <stop offset="80%" stop-color="#f5d796" stop-opacity="0.03" />
      <stop offset="100%" stop-color="#050507" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="goldDim" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a4a52" stop-opacity="0.1" />
      <stop offset="25%" stop-color="#5a7a7a" stop-opacity="0.4" />
      <stop offset="60%" stop-color="#b89354" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#b89354" stop-opacity="0.1" />
    </linearGradient>

    <linearGradient id="goldBright" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5a7a7a" stop-opacity="0" />
      <stop offset="20%" stop-color="#b89354" stop-opacity="0.8" />
      <stop offset="60%" stop-color="#f5d796" stop-opacity="1" />
      <stop offset="100%" stop-color="#f5d796" stop-opacity="0" />
    </linearGradient>

    <style>
      @keyframes seamlessFlow {
        from { stroke-dashoffset: 0; }
        to { stroke-dashoffset: -100; }
      }

      @keyframes sparkEject {
        0% { transform: translateX(0); opacity: 0; }
        20% { opacity: 0.8; }
        80% { opacity: 0; }
        100% { transform: translateX(30px); opacity: 0; }
      }

      @keyframes slowBreathe {
        0%, 100% { transform: scaleY(0.98); opacity: 0.7; }
        50% { transform: scaleY(1.02); opacity: 1; }
      }

      .flow-fast {
        stroke-dasharray: 20 80;
        animation: seamlessFlow 3s linear infinite;
        stroke-linecap: round;
      }
      .flow-medium {
        stroke-dasharray: 15 85;
        animation: seamlessFlow 4.5s linear infinite;
        stroke-linecap: round;
      }
      .flow-slow {
        stroke-dasharray: 25 75;
        animation: seamlessFlow 7s linear infinite;
        stroke-linecap: round;
      }
      
      .wave-breathe { animation: slowBreathe 12s ease-in-out infinite; transform-origin: center; }
      .wave-breathe-alt { animation: slowBreathe 15s ease-in-out infinite alternate-reverse; transform-origin: center; }

      .spark { animation: sparkEject 3s cubic-bezier(0.2, 0.8, 0.2, 1) infinite; }
      .d1 { animation-delay: 0.5s; }
      .d2 { animation-delay: 1.2s; }
      .d3 { animation-delay: 2.1s; }
    </style>
  </defs>

  <g class="wave-breathe">
    <path d="M 180,200 C 350,200 450,80 680,110 L 680,400 L 180,400 Z" fill="url(#waveFill)" />
  </g>
  <g class="wave-breathe-alt">
    <path d="M 180,280 C 400,280 480,200 680,240 L 680,400 L 180,400 Z" fill="url(#waveFill)" />
  </g>

  <g fill="none">
    <path id="flow1" d="M 190,120 C 300,120 400,80 520,90 S 640,130 680,110" pathLength="100" />
    <use href="#flow1" stroke="url(#goldDim)" stroke-width="1.5" />
    <use href="#flow1" stroke="url(#goldBright)" stroke-width="2.5" class="flow-slow" />
    
    <path id="flow2" d="M 190,160 C 320,160 380,120 480,130 S 600,180 680,150" pathLength="100" />
    <use href="#flow2" stroke="url(#goldDim)" stroke-width="1.5" />
    <use href="#flow2" stroke="url(#goldBright)" stroke-width="2" class="flow-fast" style="animation-delay: -1s;" />

    <path id="flow3" d="M 190,220 C 360,220 420,180 520,200 S 640,260 680,230" pathLength="100" />
    <use href="#flow3" stroke="url(#goldDim)" stroke-width="2" />
    <use href="#flow3" stroke="url(#goldBright)" stroke-width="3" class="flow-medium" style="filter: drop-shadow(0 0 5px rgba(245, 215, 150, 0.4));" />

    <path id="flow4" d="M 190,280 C 330,280 380,240 480,270 S 580,330 680,300" pathLength="100" />
    <use href="#flow4" stroke="url(#goldDim)" stroke-width="1.5" />
    <use href="#flow4" stroke="url(#goldBright)" stroke-width="2" class="flow-slow" style="animation-delay: -3s;" />
    
    <path id="flow5" d="M 190,340 C 340,340 400,300 500,340 S 620,380 680,360" pathLength="100" />
    <use href="#flow5" stroke="url(#goldDim)" stroke-width="1.5" />
    <use href="#flow5" stroke="url(#goldBright)" stroke-width="2.5" class="flow-medium" style="animation-delay: -2s;" />
  </g>

  <g transform="translate(20, 40)">
    <rect x="0" y="0" width="170" height="320" fill="#0b0e11" stroke="#222d33" stroke-width="1.5" />
    <circle cx="0" cy="0" r="1.5" fill="#5a7a7a" />
    <circle cx="170" cy="0" r="1.5" fill="#5a7a7a" />
    <circle cx="0" cy="320" r="1.5" fill="#5a7a7a" />
    <circle cx="170" cy="320" r="1.5" fill="#5a7a7a" />
    
    <path d="M 0,24 L 170,24" stroke="#161e22" stroke-width="1.5" />
    <circle cx="12" cy="12" r="3" fill="#1a2328" />
    <circle cx="22" cy="12" r="3" fill="#1a2328" />
    <circle cx="32" cy="12" r="3" fill="#1a2328" />
    <rect x="46" y="9" width="60" height="6" rx="3" fill="#11161a" />
    <rect x="114" y="9" width="44" height="6" rx="3" fill="#11161a" />

    <rect x="12" y="36" width="146" height="70" rx="2" fill="#11161a" stroke="#1a2328" stroke-width="1" />
    <rect x="22" y="48" width="80" height="6" rx="2" fill="#2a3840" />
    <rect x="22" y="60" width="100" height="4" rx="2" fill="#1a2328" />
    <rect x="22" y="68" width="60" height="4" rx="2" fill="#1a2328" />
    <rect x="22" y="82" width="40" height="12" rx="2" fill="#161e22" />

    <rect x="12" y="118" width="68" height="60" rx="2" fill="#11161a" stroke="#1a2328" stroke-width="1" />
    <rect x="20" y="128" width="52" height="24" rx="2" fill="#161e22" />
    <rect x="20" y="160" width="30" height="4" rx="2" fill="#1a2328" />

    <rect x="90" y="118" width="68" height="60" rx="2" fill="#11161a" stroke="#1a2328" stroke-width="1" />
    <rect x="98" y="128" width="52" height="24" rx="2" fill="#161e22" />
    <rect x="98" y="160" width="30" height="4" rx="2" fill="#1a2328" />

    <rect x="12" y="190" width="146" height="50" rx="2" fill="#11161a" stroke="#1a2328" stroke-width="1" />
    <rect x="22" y="202" width="116" height="4" rx="2" fill="#1a2328" />
    <rect x="22" y="212" width="80" height="4" rx="2" fill="#1a2328" />

    <rect x="12" y="252" width="146" height="56" rx="2" fill="#11161a" stroke="#1a2328" stroke-width="1" />
    <rect x="22" y="264" width="40" height="4" rx="2" fill="#1a2328" />
    <rect x="22" y="274" width="90" height="4" rx="2" fill="#161e22" />
  </g>
  
  <g fill="#3a4a52">
    <rect x="180" y="118" width="10" height="4" rx="2" />
    <rect x="180" y="158" width="10" height="4" rx="2" />
    <rect x="180" y="218" width="10" height="4" rx="2" />
    <rect x="180" y="278" width="10" height="4" rx="2" />
    <rect x="180" y="338" width="10" height="4" rx="2" />
    
    <rect x="195" y="119" width="6" height="2" rx="1" fill="#7a9a9a" class="spark" />
    <rect x="195" y="159" width="8" height="2" rx="1" fill="#7a9a9a" class="spark d1" />
    <rect x="195" y="219" width="10" height="2" rx="1" fill="#b89354" class="spark d2" />
    <rect x="195" y="279" width="6" height="2" rx="1" fill="#7a9a9a" class="spark d3" />
    <rect x="195" y="339" width="8" height="2" rx="1" fill="#7a9a9a" class="spark d1" />
  </g>

</svg>
