<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-labelledby="titleH">
  <title id="titleH">Nexrena Logo - Nested Cubes</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400&amp;family=DM+Mono:wght@400&amp;display=swap');
      .text-nex { font-family: 'Cormorant Garamond', serif; font-size: 130px; font-weight: 400; fill: #FDFCFA; letter-spacing: -0.02em; }
      .text-rena { font-family: 'Cormorant Garamond', serif; font-size: 130px; font-weight: 400; fill: #C9A96E; letter-spacing: -0.02em; }
      .tagline { font-family: 'DM Mono', monospace; font-size: 14px; fill: #7A8A9E; letter-spacing: 0.35em; text-transform: uppercase; }
    </style>
  </defs>
  
  <rect width="1200" height="300" fill="#0C0F12"/>
  
  <g transform="translate(190, 150)">
    <!-- Outer Box (Wireframe with slight opacity to recede) -->
    <polygon points="0,-85 75,-42.5 0,0 -75,-42.5" fill="none" stroke="#7A8A9E" stroke-width="1" opacity="0.6"/>
    <polygon points="-75,-42.5 0,0 0,85 -75,42.5" fill="none" stroke="#7A8A9E" stroke-width="1" opacity="0.6"/>
    <polygon points="75,-42.5 0,0 0,85 75,42.5" fill="none" stroke="#7A8A9E" stroke-width="1" opacity="0.6"/>
    
    <!-- Inner Box (Solid & Brand Colors) -->
    <polygon points="0,-45 40,-22.5 0,0 -40,-22.5" fill="#E8D5B0" opacity="0.2"/>
    <polygon points="0,-45 40,-22.5 0,0 -40,-22.5" fill="none" stroke="#E8D5B0" stroke-width="1.5"/>
    
    <polygon points="-40,-22.5 0,0 0,45 -40,22.5" fill="#C9A96E" opacity="0.4"/>
    <polygon points="-40,-22.5 0,0 0,45 -40,22.5" fill="none" stroke="#C9A96E" stroke-width="1.5"/>
    
    <polygon points="40,-22.5 0,0 0,45 40,22.5" fill="#9B7D4E" opacity="0.2"/>
    <polygon points="40,-22.5 0,0 0,45 40,22.5" fill="none" stroke="#9B7D4E" stroke-width="1.5"/>
    
    <!-- Connection Struts (Tesseract feel) -->
    <line x1="0" y1="-85" x2="0" y2="-45" stroke="#C9A96E" stroke-width="1.5" stroke-dasharray="2 3"/>
    <line x1="-75" y1="-42.5" x2="-40" y2="-22.5" stroke="#C9A96E" stroke-width="1.5" stroke-dasharray="2 3"/>
    <line x1="75" y1="-42.5" x2="40" y2="-22.5" stroke="#C9A96E" stroke-width="1.5" stroke-dasharray="2 3"/>
    
    <circle cx="0" cy="-45" r="3" fill="#FDFCFA"/>
  </g>
  
  <text x="360" y="175">
    <tspan class="text-nex">Nex</tspan><tspan class="text-rena">rena</tspan>
  </text>
  <text x="366" y="235" class="tagline">Structural Systems</text>
</svg>
