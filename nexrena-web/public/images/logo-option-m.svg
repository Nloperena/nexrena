<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-labelledby="titleM">
  <title id="titleM">Nexrena Logo - Globe House Minimalist Orbit</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400&amp;family=DM+Mono:wght@400&amp;display=swap');
      .text-nex { font-family: 'Cormorant Garamond', serif; font-size: 130px; font-weight: 400; fill: #FDFCFA; letter-spacing: -0.02em; }
      .text-rena { font-family: 'Cormorant Garamond', serif; font-size: 130px; font-weight: 400; fill: #C9A96E; letter-spacing: -0.02em; }
      .tagline { font-family: 'DM Mono', monospace; font-size: 14px; fill: #7A8A9E; letter-spacing: 0.35em; text-transform: uppercase; }
    </style>
  </defs>
  
  <rect width="1200" height="300" fill="#0C0F12"/>
  
  <g transform="translate(190, 150)">
    <!-- Arc representing the globe/orbit -->
    <path d="M -65 30 A 75 75 0 1 1 65 30" fill="none" stroke="#2C3444" stroke-width="2"/>
    <path d="M -80 0 A 80 80 0 0 1 80 0" fill="none" stroke="#9B7D4E" stroke-width="1" opacity="0.6"/>
    
    <!-- Minimalist house emerging from the globe center -->
    <path d="M 0 -65 L 45 -20 V 45" fill="none" stroke="#C9A96E" stroke-width="2.5" stroke-linejoin="miter"/>
    <path d="M 0 -65 L -45 -20 V 45" fill="none" stroke="#C9A96E" stroke-width="2.5" stroke-linejoin="miter"/>
    
    <!-- Horizon / foundation line completing the globe bottom -->
    <line x1="-65" y1="45" x2="65" y2="45" stroke="#E8D5B0" stroke-width="2"/>
    
    <circle cx="0" cy="0" r="3" fill="#FDFCFA"/>
  </g>
  
  <text x="360" y="175">
    <tspan class="text-nex">Nex</tspan><tspan class="text-rena">rena</tspan>
  </text>
  <text x="366" y="235" class="tagline">Connected Living</text>
</svg>
