<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-labelledby="titleK3">
  <title id="titleK3">Nexrena Logo - Globe House Architectural Blueprint</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400&amp;family=DM+Mono:wght@400&amp;display=swap');
      .text-nex { font-family: 'Cormorant Garamond', serif; font-size: 130px; font-weight: 400; fill: #FDFCFA; letter-spacing: -0.02em; }
      .text-rena { font-family: 'Cormorant Garamond', serif; font-size: 130px; font-weight: 400; fill: #C9A96E; letter-spacing: -0.02em; }
      .tagline { font-family: 'DM Mono', monospace; font-size: 14px; fill: #7A8A9E; letter-spacing: 0.35em; text-transform: uppercase; }
    </style>
  </defs>
  
  <rect width="1200" height="300" fill="#0C0F12"/>
  
  <g transform="translate(190, 150)">
    <!-- Architectural grid / longitude latitude -->
    <path d="M -75 0 A 75 75 0 0 0 75 0" fill="none" stroke="#2C3444" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="35" ry="75" fill="none" stroke="#2C3444" stroke-width="1"/>
    <line x1="-75" y1="0" x2="75" y2="0" stroke="#2C3444" stroke-width="1"/>
    
    <!-- Bold house silhouette formed by structural beams -->
    <path d="M 0 -85 L 60 -25" fill="none" stroke="#C9A96E" stroke-width="3" stroke-linecap="round"/>
    <path d="M 0 -85 L -60 -25" fill="none" stroke="#C9A96E" stroke-width="3" stroke-linecap="round"/>
    
    <line x1="-40" y1="-45" x2="-40" y2="50" stroke="#9B7D4E" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="40" y1="-45" x2="40" y2="50" stroke="#9B7D4E" stroke-width="2.5" stroke-linecap="round"/>
    
    <!-- Base structural line tying house and globe -->
    <line x1="-55" y1="50" x2="55" y2="50" stroke="#E8D5B0" stroke-width="2" stroke-linecap="round"/>
    
    <circle cx="0" cy="-85" r="3.5" fill="#FDFCFA"/>
    <circle cx="0" cy="50" r="2.5" fill="#9B7D4E"/>
    
    <!-- Sub-beams for architectural feel -->
    <line x1="-40" y1="-15" x2="40" y2="-15" stroke="#E8D5B0" stroke-width="1" opacity="0.6"/>
    <line x1="-40" y1="15" x2="40" y2="15" stroke="#E8D5B0" stroke-width="1" opacity="0.6"/>
  </g>
  
  <text x="360" y="175">
    <tspan class="text-nex">Nex</tspan><tspan class="text-rena">rena</tspan>
  </text>
  <text x="366" y="235" class="tagline">Engineered Habitats</text>
</svg>
