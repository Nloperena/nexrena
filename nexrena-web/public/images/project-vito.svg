<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" style="background:transparent; width:100%; height:100%;">
  <defs>
    <radialGradient id="bgGlowVito" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#b89354" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#050507" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowVito" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="800" fill="url(#bgGlowVito)" />

  <!-- Background Data Floor Grid -->
  <g stroke="#b89354" stroke-width="1.5" opacity="0.15">
    <!-- Isometric grid floor lines -->
    <path d="M 100,650 L 700,950 M 200,600 L 800,900 M 300,550 L 900,850 M 400,500 L 1000,800 M 500,450 L 1100,750" />
    <path d="M 1100,650 L 500,950 M 1000,600 L 400,900 M 900,550 L 300,850 M 800,500 L 200,800 M 700,450 L 100,750" />
  </g>

  <!-- True Isometric 3D Commercial Deep Fryer -->
  <g stroke="#b89354" stroke-width="2.5" stroke-linejoin="round">
    
    <!-- Base Cabinet Faces -->
    <!-- Left face (Depth) -->
    <polygon points="600,800 400,700 400,450 600,550" fill="rgba(184,147,84,0.03)"/>
    <!-- Front face (Width) -->
    <polygon points="600,800 900,650 900,400 600,550" fill="rgba(184,147,84,0.06)"/>

    <!-- Double Doors on Front Face -->
    <line x1="750" y1="725" x2="750" y2="475" stroke-width="2" opacity="0.6"/>
    <!-- Door Handles -->
    <line x1="720" y1="550" x2="720" y2="600" stroke-width="3" stroke="#f5d796"/>
    <line x1="780" y1="520" x2="780" y2="570" stroke-width="3" stroke="#f5d796"/>
    <!-- Door Vents -->
    <line x1="640" y1="720" x2="700" y2="690" stroke-width="2" opacity="0.5"/>
    <line x1="640" y1="700" x2="700" y2="670" stroke-width="2" opacity="0.5"/>
    <line x1="640" y1="680" x2="700" y2="650" stroke-width="2" opacity="0.5"/>
    <line x1="800" y1="640" x2="860" y2="610" stroke-width="2" opacity="0.5"/>
    <line x1="800" y1="620" x2="860" y2="590" stroke-width="2" opacity="0.5"/>
    <line x1="800" y1="600" x2="860" y2="570" stroke-width="2" opacity="0.5"/>

    <!-- Top Surface / Vat Deck -->
    <polygon points="600,550 900,400 700,300 400,450" fill="rgba(184,147,84,0.09)"/>

    <!-- Left VAT (Hole cutting into the top surface) -->
    <!-- Vat rim -->
    <polygon points="570,505 700,440 610,395 480,460" fill="none" stroke="#f5d796" stroke-width="2"/>
    <!-- Inner walls dropping down -->
    <polygon points="570,505 700,440 700,600 570,665" fill="rgba(5,5,7,0.9)" stroke-width="2"/>
    <polygon points="570,505 480,460 480,620 570,665" fill="rgba(5,5,7,0.7)" stroke-width="2"/>
    <!-- Boiling Oil Surface (Z level) -->
    <polygon points="570,555 700,490 610,445 480,510" fill="rgba(184,147,84,0.2)" stroke-dasharray="4 4" stroke-width="1.5"/>

    <!-- Right VAT -->
    <polygon points="730,425 860,360 770,315 640,380" fill="none" stroke="#f5d796" stroke-width="2"/>
    <polygon points="730,425 860,360 860,520 730,585" fill="rgba(5,5,7,0.9)" stroke-width="2"/>
    <polygon points="730,425 640,380 640,540 730,585" fill="rgba(5,5,7,0.7)" stroke-width="2"/>
    <polygon points="730,475 860,410 770,365 640,430" fill="rgba(184,147,84,0.2)" stroke-dasharray="4 4" stroke-width="1.5"/>

    <!-- Backsplash (Rising from the back edge) -->
    <!-- Front face of backsplash -->
    <polygon points="400,450 700,300 700,150 400,300" fill="rgba(184,147,84,0.06)"/>
    <!-- Top edge of backsplash -->
    <polygon points="400,300 700,150 720,140 420,290" fill="rgba(184,147,84,0.1)"/>
    <!-- Right side edge of backsplash -->
    <polygon points="700,300 720,290 720,140 700,150" fill="rgba(184,147,84,0.02)"/>

    <!-- Control Panel details on Backsplash -->
    <!-- Slanted display screen -->
    <polygon points="460,400 640,310 640,260 460,350" fill="#050507" stroke="#f5d796" stroke-width="2"/>
    <!-- Glowing digits in screen -->
    <path d="M 500,360 L 520,350 M 540,340 L 560,330 M 580,320 L 600,310" stroke="#f5d796" stroke-width="3" opacity="0.8"/>
    <!-- Heavy Duty Temperature Knobs -->
    <circle cx="480" cy="270" r="14" fill="#050507" stroke="#f5d796" stroke-width="3"/>
    <line x1="480" y1="270" x2="490" y2="265" stroke="#f5d796" stroke-width="3"/>
    <circle cx="620" cy="200" r="14" fill="#050507" stroke="#f5d796" stroke-width="3"/>
    <line x1="620" y1="200" x2="625" y2="190" stroke="#f5d796" stroke-width="3"/>

    <!-- VITO Oil Filter Unit (Immersed in Left Vat) -->
    <g>
      <!-- Base structure -->
      <polygon points="520,390 580,360 580,590 520,620" fill="rgba(5,5,7,0.9)" stroke="#f5d796" stroke-width="3"/>
      <polygon points="520,390 470,365 470,595 520,620" fill="rgba(5,5,7,0.8)" stroke="#f5d796" stroke-width="3"/>
      <polygon points="520,390 580,360 530,335 470,365" fill="#f5d796" opacity="0.9"/>
      
      <!-- Filter intake / exhaust vents -->
      <line x1="530" y1="410" x2="570" y2="390" stroke="#f5d796" stroke-width="2"/>
      <line x1="530" y1="430" x2="570" y2="410" stroke="#f5d796" stroke-width="2"/>
      <line x1="530" y1="450" x2="570" y2="430" stroke="#f5d796" stroke-width="2"/>
      
      <!-- Power Cord draping over the back -->
      <path d="M 530,335 Q 520,250 480,330" fill="none" stroke="#f5d796" stroke-width="4" stroke-dasharray="8 4"/>

      <!-- Oil Filtration Vortex (Glowing paths showing the cleaning action) -->
      <!-- Rings around the VITO in the oil -->
      <ellipse cx="525" cy="510" rx="60" ry="25" fill="none" stroke="#f5d796" stroke-width="2" stroke-dasharray="6 8" transform="rotate(-26 525 510)"/>
      <ellipse cx="525" cy="510" rx="40" ry="15" fill="none" stroke="#f5d796" stroke-width="3" stroke-dasharray="4 6" transform="rotate(-26 525 510)"/>
      <ellipse cx="525" cy="510" rx="20" ry="8" fill="none" stroke="#f5d796" stroke-width="4" stroke-dasharray="2 4" transform="rotate(-26 525 510)"/>
    </g>

    <!-- Frying Basket (Submerged in Right Vat) -->
    <g>
      <!-- Wireframe Basket -->
      <!-- Back Wall -->
      <polygon points="680,390 790,335 790,485 680,540" fill="none" stroke-dasharray="4 4"/>
      <!-- Front Wall -->
      <polygon points="710,425 820,370 820,520 710,575" fill="none" stroke-dasharray="4 4"/>
      <!-- Connecting Side Wires -->
      <line x1="680" y1="390" x2="710" y2="425" stroke-dasharray="4 4"/>
      <line x1="790" y1="335" x2="820" y2="370" stroke-dasharray="4 4"/>
      <line x1="680" y1="540" x2="710" y2="575" stroke-dasharray="4 4"/>
      <line x1="790" y1="485" x2="820" y2="520" stroke-dasharray="4 4"/>
      
      <!-- Sturdy Handle -->
      <path d="M 735,362 L 710,250 L 760,225" fill="none" stroke="#f5d796" stroke-width="5" stroke-linejoin="round" stroke-linecap="round"/>
      <!-- Handle Grip -->
      <path d="M 720,245 L 760,225" fill="none" stroke="#b89354" stroke-width="12" stroke-linecap="round"/>
    </g>

  </g>

  <!-- Glowing Tech / Infrastructure Nodes -->
  <g fill="#f5d796">
    <!-- Fryer Frame Structure Corners -->
    <circle cx="600" cy="800" r="6" />
    <circle cx="400" cy="700" r="5" />
    <circle cx="900" cy="650" r="5" />
    <circle cx="600" cy="550" r="5" fill="#fff" filter="url(#glowVito)"/>
    <circle cx="400" cy="450" r="5" />
    <circle cx="900" cy="400" r="5" />
    <circle cx="700" cy="300" r="5" fill="#fff" filter="url(#glowVito)"/>

    <!-- VITO Processing Core inside device -->
    <circle cx="525" cy="510" r="10" fill="#fff" filter="url(#glowVito)"/>
    <circle cx="520" cy="400" r="5" fill="#fff" filter="url(#glowVito)"/>

    <!-- Oil Bubbles / Purified Particles -->
    <circle cx="600" cy="510" r="4" fill="#fff" filter="url(#glowVito)"/>
    <circle cx="630" cy="480" r="3" fill="#fff" filter="url(#glowVito)"/>
    <circle cx="480" cy="560" r="3" fill="#fff" filter="url(#glowVito)"/>
    <circle cx="500" cy="580" r="4" fill="#fff" filter="url(#glowVito)"/>
    
    <!-- Deep frying bubbles in Right Vat -->
    <circle cx="750" cy="460" r="3" />
    <circle cx="780" cy="440" r="4" fill="#fff" filter="url(#glowVito)"/>
    <circle cx="730" cy="490" r="4" />

    <!-- Control Panel Dials -->
    <circle cx="480" cy="270" r="6" fill="#fff" filter="url(#glowVito)"/>
    <circle cx="620" cy="200" r="6" fill="#fff" filter="url(#glowVito)"/>
  </g>
</svg>