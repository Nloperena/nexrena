<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-labelledby="titleL">
  <title id="titleL">Nexrena Logo - Globe House Geometric</title>
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400&amp;family=DM+Mono:wght@400&amp;display=swap');
      .text-nex { font-family: 'Cormorant Garamond', serif; font-size: 130px; font-weight: 400; fill: #FDFCFA; letter-spacing: -0.02em; }
      .text-rena { font-family: 'Cormorant Garamond', serif; font-size: 130px; font-weight: 400; fill: #C9A96E; letter-spacing: -0.02em; }
      .tagline { font-family: 'DM Mono', monospace; font-size: 14px; fill: #7A8A9E; letter-spacing: 0.35em; text-transform: uppercase; }
    </style>
  </defs>
  
  <rect width="1200" height="300" fill="#0C0F12"/>
  
  <g transform="translate(190, 150)">
    <!-- Solid sphere background representing the globe -->
    <circle cx="0" cy="0" r="75" fill="#1A1E26"/>
    <!-- Globe lines -->
    <path d="M -53 -53 Q 0 -85 53 -53" fill="none" stroke="#2C3444" stroke-width="1.5"/>
    <path d="M -53 53 Q 0 85 53 53" fill="none" stroke="#2C3444" stroke-width="1.5"/>
    
    <!-- House shape masked / built over the globe -->
    <!-- House silhouette outline intersecting the globe -->
    <polygon points="0,-85 85,-10 50,-10 50,60 -50,60 -50,-10 -85,-10" fill="none" stroke="#C9A96E" stroke-width="2.5" stroke-linejoin="round"/>
    
    <!-- Inner geometric cuts connecting house to globe lines -->
    <path d="M 0 -85 L 0 60" fill="none" stroke="#E8D5B0" stroke-width="1" opacity="0.6"/>
    <path d="M -50 25 L 50 25" fill="none" stroke="#E8D5B0" stroke-width="1" opacity="0.6"/>
    
    <circle cx="0" cy="-10" r="8" fill="#9B7D4E" opacity="0.8"/>
    <circle cx="0" cy="-10" r="4" fill="#FDFCFA"/>
  </g>
  
  <text x="360" y="175">
    <tspan class="text-nex">Nex</tspan><tspan class="text-rena">rena</tspan>
  </text>
  <text x="366" y="235" class="tagline">Engineered Habitats</text>
</svg>
