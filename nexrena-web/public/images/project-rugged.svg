<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" style="background:transparent; width:100%; height:100%;">
  <defs>
    <radialGradient id="bgGlowRugged" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#b89354" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#b89354" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lineGradRugged" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#f5d796" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#b89354" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="glowRugged" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="800" fill="url(#bgGlowRugged)" />

  <g fill="none" stroke="url(#lineGradRugged)" stroke-width="2.5" stroke-linejoin="round">
    <!-- Smooth curved spray bottle body -->
    <path d="M 450,650 C 450,700 750,700 750,650 C 780,500 750,350 650,250 C 620,220 620,180 620,150 L 580,150 C 580,180 580,220 550,250 C 450,350 420,500 450,650 Z" stroke-width="3.5" />
    
    <!-- Liquid Level Curve (Sine Wave Flow) -->
    <path d="M 440,500 C 500,470 600,530 760,500" stroke="#f5d796" stroke-width="3" stroke-dasharray="6 6" opacity="0.8"/>
    <path d="M 445,550 C 500,520 600,580 755,550" opacity="0.4" stroke-dasharray="4 8"/>
    <path d="M 450,600 C 500,570 600,630 750,600" opacity="0.2" stroke-dasharray="2 6"/>
    
    <!-- Ergonomic Grip Indentations on the left side -->
    <path d="M 440,400 C 460,420 460,440 440,460" stroke="#f5d796" stroke-width="2" />
    <path d="M 440,480 C 460,500 460,520 440,540" stroke="#f5d796" stroke-width="2" />
    
    <!-- Internal Straw / Fluid Pipeline -->
    <path d="M 600,150 C 600,300 550,500 700,680" stroke-dasharray="8 8" stroke-width="4" opacity="0.7"/>
    <path d="M 590,150 C 590,300 540,500 690,680" opacity="0.2"/>
    <path d="M 610,150 C 610,300 560,500 710,680" opacity="0.2"/>
    
    <!-- Spray Nozzle Head -->
    <rect x="570" y="125" width="60" height="25" rx="6" />
    <rect x="575" y="105" width="50" height="20" rx="3" />
    
    <!-- Main Nozzle Block -->
    <path d="M 575,105 L 530,105 C 510,105 510,65 530,65 L 680,65 C 700,65 710,85 710,105 L 625,105 Z" stroke="#f5d796" stroke-width="3" />
    
    <!-- Trigger (Curved) -->
    <path d="M 530,105 C 500,145 480,175 500,215 C 510,225 520,225 530,215 C 520,175 530,145 560,125" stroke="#f5d796" stroke-width="3"/>
    
    <!-- Spray Cone/Particles (Curved sweeping paths radiating outward) -->
    <path d="M 710,85 C 800,45 900,15 1000,-5" stroke-dasharray="4 12" stroke-width="4" stroke="#f5d796" stroke-linecap="round"/>
    <path d="M 710,85 C 850,85 950,95 1050,105" stroke-dasharray="2 8" stroke-width="5" stroke="#f5d796" stroke-linecap="round" opacity="0.7"/>
    <path d="M 710,85 C 800,125 900,175 1000,215" stroke-dasharray="4 12" stroke-width="4" stroke="#f5d796" stroke-linecap="round"/>
    
    <!-- Concentric tech rings radiating from nozzle -->
    <path d="M 750,35 C 780,75 780,95 750,135" opacity="0.6"/>
    <path d="M 800,-5 C 850,65 850,105 800,175" stroke-dasharray="6 6" opacity="0.4"/>
  </g>

  <!-- Glowing Tech Nodes -->
  <g fill="#f5d796">
    <!-- Trigger & Nozzle core -->
    <circle cx="600" cy="65" r="5" fill="#fff" filter="url(#glowRugged)"/>
    <circle cx="710" cy="85" r="7" fill="#fff" filter="url(#glowRugged)"/>
    <circle cx="500" cy="215" r="5" fill="#fff" filter="url(#glowRugged)"/>
    
    <!-- Liquid / Structural Nodes -->
    <circle cx="560" cy="485" r="6" fill="#fff" filter="url(#glowRugged)"/>
    <circle cx="700" cy="680" r="6" />
    <circle cx="650" cy="250" r="4" />
    <circle cx="550" cy="250" r="4" />
    
    <!-- Spray droplets acting as data transmission -->
    <circle cx="850" cy="40" r="4" />
    <circle cx="950" cy="95" r="6" fill="#fff" filter="url(#glowRugged)"/>
    <circle cx="880" cy="140" r="5" />
    <circle cx="1000" cy="215" r="4" fill="#fff" filter="url(#glowRugged)"/>
  </g>
</svg>