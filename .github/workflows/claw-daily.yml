name: Claw Daily Ops

on:
  schedule:
    # 9 AM ET (UTC-4 in summer / UTC-5 in winter) weekdays
    - cron: '0 13 * * 1-5'
  workflow_dispatch:
    inputs:
      task:
        description: 'Which task to run'
        required: true
        default: 'standup'
        type: choice
        options:
          - standup
          - weekly-brief
          - weekly-wrap
          - monthly-finance
          - follow-up-check

jobs:
  claw-task:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run Claw task
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEXRENA_API_URL: ${{ secrets.NEXRENA_API_URL }}
          NEXRENA_API_KEY: ${{ secrets.NEXRENA_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TASK: ${{ github.event.inputs.task || 'standup' }}
        run: python scripts/claw_task.py
