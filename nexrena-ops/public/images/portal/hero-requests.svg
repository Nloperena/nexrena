<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" style="width: 100%; height: auto;">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="45%" r="68%">
      <stop offset="0%" stop-color="#1a2030" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0c0f12" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mainLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a2a10"/>
      <stop offset="45%" stop-color="#b89354"/>
      <stop offset="100%" stop-color="#f5d796"/>
    </linearGradient>
    <linearGradient id="topFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0c0f12" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0c0f12" stop-opacity="0"/>
    </linearGradient>
    <path id="reqTrack" d="M 70,310 C 130,270 190,290 260,250 C 330,210 400,240 470,200 C 530,170 590,190 640,140" fill="none"/>
    <style>.node-glow{filter:drop-shadow(0 0 4px rgba(240,208,128,.5))}.head-glow{filter:drop-shadow(0 0 5px #fff)}</style>
  </defs>
  <rect width="680" height="400" fill="url(#bgGlow)"/>
  
  <!-- Thematic Background: Kanban Board, Tickets, Queue -->
  <g opacity="0.25" fill="none" stroke="#7a5c2d" stroke-width="1.5">
    <!-- Board Columns -->
    <rect x="140" y="80" width="120" height="240" rx="8" />
    <rect x="280" y="80" width="120" height="240" rx="8" />
    <rect x="420" y="80" width="120" height="240" rx="8" />
    
    <!-- Column Headers -->
    <path d="M140,110 H260 M280,110 H400 M420,110 H540" />
    
    <!-- Tickets -->
    <rect x="155" y="130" width="90" height="40" rx="4" />
    <path d="M165,145 H235 M165,155 H210" stroke-width="2" opacity="0.5" stroke-linecap="round" />
    
    <rect x="155" y="185" width="90" height="60" rx="4" />
    <path d="M165,200 H235 M165,210 H220 M165,220 H200" stroke-width="2" opacity="0.5" stroke-linecap="round" />
    
    <rect x="295" y="130" width="90" height="50" rx="4" />
    <path d="M305,145 H375 M305,155 H350" stroke-width="2" opacity="0.5" stroke-linecap="round" />
    <circle cx="370" cy="165" r="4" fill="#7a5c2d" />
    
    <rect x="435" y="150" width="90" height="40" rx="4" />
    <path d="M445,165 H515 M445,175 H490" stroke-width="2" opacity="0.5" stroke-linecap="round" />
    
    <rect x="435" y="205" width="90" height="70" rx="4" />
    <path d="M445,220 H515 M445,230 H500 M445,240 H480" stroke-width="2" opacity="0.5" stroke-linecap="round" />
    <circle cx="510" cy="260" r="4" fill="#7a5c2d" />
    
    <!-- Movement Arrows -->
    <path d="M250,150 L270,150 L265,145 M270,150 L265,155" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M390,170 L410,170 L405,165 M410,170 L405,175" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <use href="#reqTrack" stroke="#f5d796" stroke-width="10" opacity="0.06" stroke-linecap="round"/>
  <use href="#reqTrack" stroke="#3a2a10" stroke-width="2" stroke-linecap="round"/>
  <use href="#reqTrack" stroke="url(#mainLine)" stroke-width="2.5" stroke-linecap="round"/>
  <g>
    <circle cx="0" cy="0" r="3.5" fill="#fff" class="head-glow"><animateMotion dur="4.6s" repeatCount="indefinite"><mpath href="#reqTrack"/></animateMotion></circle>
    <circle cx="0" cy="0" r="2" fill="#f5d796" opacity="0.45"><animateMotion dur="4.6s" begin="-0.35s" repeatCount="indefinite"><mpath href="#reqTrack"/></animateMotion></circle>
  </g>
  <g transform="translate(165,280)"><circle cx="0" cy="0" r="11" fill="none" stroke="#b89354"><animate attributeName="r" values="7;18" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0" dur="2s" repeatCount="indefinite"/></circle><circle cx="0" cy="0" r="6" fill="#0c0f12" stroke="#c9a050" stroke-width="1.5"/><circle cx="0" cy="0" r="1.6" fill="#f0d080" class="node-glow"/></g>
  <g transform="translate(320,245)"><circle cx="0" cy="0" r="15" fill="none" stroke="#b89354"><animate attributeName="r" values="10;23" dur="2s" begin="0.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0" dur="2s" begin="0.5s" repeatCount="indefinite"/></circle><circle cx="0" cy="0" r="8" fill="#0c0f12" stroke="#c9a050" stroke-width="1.5"/><circle cx="0" cy="0" r="2.2" fill="#f0d080" class="node-glow"/></g>
  <g transform="translate(490,205)"><circle cx="0" cy="0" r="13" fill="none" stroke="#b89354"><animate attributeName="r" values="9;21" dur="2s" begin="1s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0" dur="2s" begin="1s" repeatCount="indefinite"/></circle><circle cx="0" cy="0" r="7" fill="#0c0f12" stroke="#c9a050" stroke-width="1.5"/><circle cx="0" cy="0" r="1.9" fill="#f0d080" class="node-glow"/></g>
  <g transform="translate(620,145)"><circle cx="0" cy="0" r="20" fill="none" stroke="#b89354"><animate attributeName="r" values="14;30" dur="2s" begin="0.3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0" dur="2s" begin="0.3s" repeatCount="indefinite"/></circle><circle cx="0" cy="0" r="10" fill="#0c0f12" stroke="#f0d080" stroke-width="2"/><circle cx="0" cy="0" r="2.6" fill="#f0d080"/></g>
  <rect width="680" height="40" fill="url(#topFade)"/>
</svg>