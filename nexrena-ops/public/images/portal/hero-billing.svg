<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" style="width: 100%; height: auto;">
  <defs>
    <radialGradient id="bgGlow" cx="60%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#1a1e28" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0c0f12" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mainLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a2a10"/>
      <stop offset="35%" stop-color="#b89354"/>
      <stop offset="65%" stop-color="#f5d796"/>
      <stop offset="100%" stop-color="#7a5c2d"/>
    </linearGradient>
    <linearGradient id="topFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0c0f12" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0c0f12" stop-opacity="0"/>
    </linearGradient>
    <path id="billTrack" d="M 80,300 C 140,270 200,250 280,240 C 360,230 420,190 500,175 C 560,165 610,140 650,110" fill="none"/>
    <style>.node-glow{filter:drop-shadow(0 0 4px rgba(240,208,128,.5))}.head-glow{filter:drop-shadow(0 0 5px #fff)}</style>
  </defs>
  <rect width="680" height="400" fill="url(#bgGlow)"/>
  <g opacity="0.18" stroke="#7a5c2d" stroke-width="1" fill="none">
    <rect x="120" y="90" width="140" height="180" rx="6"/>
    <path d="M140,130 H240 M140,160 H220 M140,190 H230 M140,220 H200"/>
    <rect x="300" y="110" width="120" height="150" rx="6"/>
    <path d="M320,145 H400 M320,175 H385 M320,205 H390"/>
    <rect x="460" y="100" width="130" height="165" rx="6"/>
    <path d="M480,135 H560 M480,165 H545 M480,195 H555 M480,225 H520"/>
  </g>
  <use href="#billTrack" stroke="#f5d796" stroke-width="11" opacity="0.06" stroke-linecap="round"/>
  <use href="#billTrack" stroke="#3a2a10" stroke-width="2" stroke-linecap="round"/>
  <use href="#billTrack" stroke="url(#mainLine)" stroke-width="2.5" stroke-linecap="round"/>
  <g>
    <circle cx="0" cy="0" r="3.5" fill="#fff" class="head-glow"><animateMotion dur="4s" repeatCount="indefinite"><mpath href="#billTrack"/></animateMotion></circle>
    <circle cx="0" cy="0" r="2" fill="#f5d796" opacity="0.5"><animateMotion dur="4s" begin="-0.35s" repeatCount="indefinite"><mpath href="#billTrack"/></animateMotion></circle>
  </g>
  <g transform="translate(200,255)"><circle cx="0" cy="0" r="13" fill="none" stroke="#b89354"><animate attributeName="r" values="9;21" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0" dur="2s" repeatCount="indefinite"/></circle><circle cx="0" cy="0" r="7" fill="#0c0f12" stroke="#c9a050" stroke-width="1.5"/><circle cx="0" cy="0" r="1.8" fill="#f0d080" class="node-glow"/></g>
  <g transform="translate(360,235)"><circle cx="0" cy="0" r="17" fill="none" stroke="#b89354"><animate attributeName="r" values="12;26" dur="2s" begin="0.7s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0" dur="2s" begin="0.7s" repeatCount="indefinite"/></circle><circle cx="0" cy="0" r="10" fill="#0c0f12" stroke="#c9a050" stroke-width="1.5"/><circle cx="0" cy="0" r="2.6" fill="#f0d080" class="node-glow"/></g>
  <g transform="translate(540,185)"><circle cx="0" cy="0" r="22" fill="none" stroke="#b89354"><animate attributeName="r" values="15;32" dur="2s" begin="1.1s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0" dur="2s" begin="1.1s" repeatCount="indefinite"/></circle><circle cx="0" cy="0" r="11" fill="#0c0f12" stroke="#f0d080" stroke-width="2"/><circle cx="0" cy="0" r="3" fill="#f0d080"/></g>
  <rect width="680" height="40" fill="url(#topFade)"/>
</svg>
