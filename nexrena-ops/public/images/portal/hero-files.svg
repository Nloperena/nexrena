<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" style="width: 100%; height: auto;">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#181e28" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0c0f12" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mainLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a2a10"/>
      <stop offset="45%" stop-color="#b89354"/>
      <stop offset="100%" stop-color="#f5d796"/>
    </linearGradient>
    <linearGradient id="topFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0c0f12" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0c0f12" stop-opacity="0"/>
    </linearGradient>
    <path id="fileTrack" d="M 70,280 C 130,240 190,260 250,220 C 310,180 380,200 440,170 C 500,140 560,160 620,120" fill="none"/>
    <style>.node-glow{filter:drop-shadow(0 0 4px rgba(240,208,128,.5))}.head-glow{filter:drop-shadow(0 0 5px #fff)}</style>
  </defs>
  <rect width="680" height="400" fill="url(#bgGlow)"/>
  
  <!-- Thematic Background: Folders, Files, Documents -->
  <g opacity="0.25" fill="none" stroke="#7a5c2d" stroke-width="1.5">
    <!-- Folder 1 (Back) -->
    <path d="M160,100 H220 L240,120 H340 V150" />
    <path d="M340,150 V200 H320" />
    
    <!-- Folder 2 (Front) -->
    <path d="M140,120 H200 L220,140 H320 V220 H140 Z" />
    <path d="M140,150 H320" />
    <path d="M160,170 H250 M160,190 H220" stroke-linecap="round" />

    <!-- File Document -->
    <rect x="420" y="100" width="110" height="150" rx="4" />
    <path d="M480,100 L530,150 V250" />
    <path d="M480,100 V150 H530" />
    <path d="M440,160 H510 M440,185 H490 M440,210 H510 M440,235 H480" stroke-linecap="round" />
    
    <!-- Floating File -->
    <rect x="340" y="240" width="60" height="80" rx="2" opacity="0.6" />
    <path d="M340,260 H400 M350,280 H390 M350,300 H380" stroke-linecap="round" opacity="0.6" />
  </g>

  <use href="#fileTrack" stroke="#f5d796" stroke-width="10" opacity="0.06" stroke-linecap="round"/>
  <use href="#fileTrack" stroke="#3a2a10" stroke-width="2" stroke-linecap="round"/>
  <use href="#fileTrack" stroke="url(#mainLine)" stroke-width="2.5" stroke-linecap="round"/>
  <g>
    <circle cx="0" cy="0" r="3.5" fill="#fff" class="head-glow"><animateMotion dur="4.2s" repeatCount="indefinite"><mpath href="#fileTrack"/></animateMotion></circle>
    <circle cx="0" cy="0" r="2" fill="#f5d796" opacity="0.45"><animateMotion dur="4.2s" begin="-0.3s" repeatCount="indefinite"><mpath href="#fileTrack"/></animateMotion></circle>
  </g>
  <g transform="translate(170,250)"><circle cx="0" cy="0" r="11" fill="none" stroke="#b89354"><animate attributeName="r" values="7;18" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0" dur="2s" repeatCount="indefinite"/></circle><circle cx="0" cy="0" r="6" fill="#0c0f12" stroke="#c9a050" stroke-width="1.5"/><circle cx="0" cy="0" r="1.6" fill="#f0d080" class="node-glow"/></g>
  <g transform="translate(310,205)"><circle cx="0" cy="0" r="15" fill="none" stroke="#b89354"><animate attributeName="r" values="10;23" dur="2s" begin="0.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0" dur="2s" begin="0.5s" repeatCount="indefinite"/></circle><circle cx="0" cy="0" r="8" fill="#0c0f12" stroke="#c9a050" stroke-width="1.5"/><circle cx="0" cy="0" r="2.2" fill="#f0d080" class="node-glow"/></g>
  <g transform="translate(480,175)"><circle cx="0" cy="0" r="13" fill="none" stroke="#b89354"><animate attributeName="r" values="9;21" dur="2s" begin="1s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0" dur="2s" begin="1s" repeatCount="indefinite"/></circle><circle cx="0" cy="0" r="7" fill="#0c0f12" stroke="#c9a050" stroke-width="1.5"/><circle cx="0" cy="0" r="1.9" fill="#f0d080" class="node-glow"/></g>
  <rect width="680" height="40" fill="url(#topFade)"/>
</svg>