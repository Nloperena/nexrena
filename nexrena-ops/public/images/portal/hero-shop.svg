<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" style="width: 100%; height: auto;">
  <defs>
    <radialGradient id="bgGlow" cx="45%" cy="55%" r="65%">
      <stop offset="0%" stop-color="#1e1205" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0c0f12" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mainLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a2a10"/>
      <stop offset="40%" stop-color="#b89354"/>
      <stop offset="70%" stop-color="#f5d796"/>
      <stop offset="100%" stop-color="#7a5c2d"/>
    </linearGradient>
    <linearGradient id="topFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0c0f12" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0c0f12" stop-opacity="0"/>
    </linearGradient>
    <path id="aisleTrack" d="M 60,280 C 120,260 180,220 260,210 C 340,200 420,160 520,150 C 580,145 620,120 640,95" fill="none"/>
    <style>.node-glow{filter:drop-shadow(0 0 4px rgba(240,208,128,.5))}.head-glow{filter:drop-shadow(0 0 5px #fff)}</style>
  </defs>
  <rect width="680" height="400" fill="url(#bgGlow)"/>
  
  <!-- Thematic Background: Isometric Packages / Shop -->
  <g opacity="0.25" fill="none" stroke="#7a5c2d" stroke-width="1.2" stroke-linejoin="round">
    <!-- Box 1 -->
    <path d="M150,150 L200,125 L250,150 L200,175 Z" />
    <path d="M150,150 L150,200 L200,225 L250,200 L250,150" />
    <path d="M200,175 L200,225" />
    <!-- Box 2 -->
    <path d="M350,120 L400,95 L450,120 L400,145 Z" />
    <path d="M350,120 L350,170 L400,195 L450,170 L450,120" />
    <path d="M400,145 L400,195" />
    <!-- Box 3 -->
    <path d="M480,180 L530,155 L580,180 L530,205 Z" />
    <path d="M480,180 L480,230 L530,255 L580,230 L580,180" />
    <path d="M530,205 L530,255" />
    <!-- Box 4 (Small) -->
    <path d="M280,220 L310,205 L340,220 L310,235 Z" />
    <path d="M280,220 L280,250 L310,265 L340,250 L340,220" />
    <path d="M310,235 L310,265" />
  </g>

  <use href="#aisleTrack" stroke="#f5d796" stroke-width="12" opacity="0.06" stroke-linecap="round"/>
  <use href="#aisleTrack" stroke="#3a2a10" stroke-width="2" stroke-linecap="round"/>
  <use href="#aisleTrack" stroke="url(#mainLine)" stroke-width="2.5" stroke-linecap="round"/>
  <g>
    <circle cx="0" cy="0" r="3.5" fill="#fff" class="head-glow"><animateMotion dur="5s" repeatCount="indefinite"><mpath href="#aisleTrack"/></animateMotion></circle>
    <circle cx="0" cy="0" r="2" fill="#f5d796" opacity="0.5"><animateMotion dur="5s" begin="-0.3s" repeatCount="indefinite"><mpath href="#aisleTrack"/></animateMotion></circle>
  </g>
  <g transform="translate(140,210)"><circle cx="0" cy="0" r="14" fill="none" stroke="#b89354"><animate attributeName="r" values="10;22" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0" dur="2s" repeatCount="indefinite"/></circle><circle cx="0" cy="0" r="8" fill="#0c0f12" stroke="#c9a050" stroke-width="1.5"/><circle cx="0" cy="0" r="2" fill="#f0d080" class="node-glow"/></g>
  <g transform="translate(300,200)"><circle cx="0" cy="0" r="18" fill="none" stroke="#b89354"><animate attributeName="r" values="12;26" dur="2s" begin="0.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0" dur="2s" begin="0.5s" repeatCount="indefinite"/></circle><circle cx="0" cy="0" r="10" fill="#0c0f12" stroke="#c9a050" stroke-width="1.5"/><circle cx="0" cy="0" r="2.5" fill="#f0d080" class="node-glow"/></g>
  <g transform="translate(480,165)"><circle cx="0" cy="0" r="16" fill="none" stroke="#b89354"><animate attributeName="r" values="11;24" dur="2s" begin="1s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0" dur="2s" begin="1s" repeatCount="indefinite"/></circle><circle cx="0" cy="0" r="9" fill="#0c0f12" stroke="#c9a050" stroke-width="1.5"/><circle cx="0" cy="0" r="2.2" fill="#f0d080" class="node-glow"/></g>
  <g transform="translate(620,100)"><circle cx="0" cy="0" r="28" fill="none" stroke="#b89354"><animate attributeName="r" values="20;40" dur="2s" begin="0.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0" dur="2s" begin="0.2s" repeatCount="indefinite"/></circle><circle cx="0" cy="0" r="12" fill="#0c0f12" stroke="#f0d080" stroke-width="2"/><circle cx="0" cy="0" r="3.2" fill="#f0d080"/></g>
  <rect width="680" height="40" fill="url(#topFade)"/>
</svg>