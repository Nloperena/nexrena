<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" preserveAspectRatio="xMidYMid slice" style="width: 100%; height: auto; display: block;">
  <defs>
    <radialGradient id="bgGlow" cx="75%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#b89354" stop-opacity="0.06" />
      <stop offset="50%" stop-color="#b89354" stop-opacity="0.01" />
      <stop offset="100%" stop-color="#050507" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="fadeMaskGrad" cx="75%" cy="50%" r="45%">
      <stop offset="10%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0" />
    </radialGradient>
    <mask id="gridMask">
      <rect width="1200" height="675" fill="url(#fadeMaskGrad)" />
    </mask>

    <radialGradient id="nodeNear" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1" />
      <stop offset="15%" stop-color="#f5d796" stop-opacity="0.9" />
      <stop offset="40%" stop-color="#b89354" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#050507" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="nodeMid" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5d796" stop-opacity="0.7" />
      <stop offset="30%" stop-color="#b89354" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#050507" stop-opacity="0" />
    </radialGradient>

    <radialGradient id="nodeFar" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a050" stop-opacity="0.3" />
      <stop offset="40%" stop-color="#7a5c2d" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#050507" stop-opacity="0" />
    </radialGradient>

    <filter id="railGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      @keyframes scaleNear {
        0%, 100% { transform: scale(0.95); opacity: 0.8; }
        50% { transform: scale(1.15); opacity: 1; }
      }
      @keyframes scaleMid {
        0%, 100% { transform: scale(0.8); opacity: 0.5; }
        50% { transform: scale(1.1); opacity: 0.85; }
      }
      @keyframes scaleFar {
        0%, 100% { transform: scale(0.5); opacity: 0.3; }
        50% { transform: scale(0.9); opacity: 0.6; }
      }
      @keyframes flowForward { 0% { stroke-dashoffset: 100; } 100% { stroke-dashoffset: 0; } }
      @keyframes flowReverse { 0% { stroke-dashoffset: -100; } 100% { stroke-dashoffset: 0; } }
      @keyframes parallaxDrift {
        0% { transform: translate(0px, 0px) scale(1); }
        33% { transform: translate(-15px, -20px) scale(1.1); }
        66% { transform: translate(10px, -30px) scale(0.9); }
        100% { transform: translate(0px, 0px) scale(1); }
      }
      @keyframes slowReveal { from { opacity: 0; } to { opacity: 1; } }

      .z-near { animation: scaleNear 6s ease-in-out infinite; }
      .z-mid { animation: scaleMid 8s ease-in-out infinite alternate; }
      .z-far { animation: scaleFar 10s ease-in-out infinite alternate-reverse; }
      .rail-fast { stroke-dasharray: 8 92; animation: flowForward 3.5s linear infinite; stroke-linecap: round; }
      .rail-slow { stroke-dasharray: 12 88; animation: flowReverse 5s linear infinite; stroke-linecap: round; }
      .rail-diag { stroke-dasharray: 6 94; animation: flowForward 4.5s linear infinite; stroke-linecap: round; }
      .particle-slow { animation: parallaxDrift 30s ease-in-out infinite; }
      .reveal { animation: slowReveal 2s ease-out forwards; opacity: 0; }
      .stagger-1 { animation-delay: -1.5s; }
      .stagger-2 { animation-delay: -3s; }
      .stagger-3 { animation-delay: -5s; }
    </style>

    <path id="h1" d="M 400,150 L 1200,150" pathLength="100" />
    <path id="h2" d="M 400,260 L 1200,260" pathLength="100" />
    <path id="h3" d="M 400,370 L 1200,370" pathLength="100" />
    <path id="h4" d="M 400,480 L 1200,480" pathLength="100" />
    <path id="h5" d="M 400,590 L 1200,590" pathLength="100" />
    <path id="v1" d="M 650,0 L 650,675" pathLength="100" />
    <path id="v2" d="M 780,0 L 780,675" pathLength="100" />
    <path id="v3" d="M 910,0 L 910,675" pathLength="100" />
    <path id="v4" d="M 1040,0 L 1040,675" pathLength="100" />
    <path id="d1" d="M 650,150 L 910,370" pathLength="100" />
    <path id="d2" d="M 650,370 L 910,150" pathLength="100" />
    <path id="d3" d="M 780,480 L 910,370" pathLength="100" />
  </defs>

  <rect width="1200" height="675" fill="#050507" />
  <g class="particle-slow reveal" fill="url(#nodeFar)" opacity="0.6">
    <circle cx="500" cy="200" r="40" class="stagger-1" />
    <circle cx="850" cy="100" r="60" class="stagger-3" />
    <circle cx="1050" cy="500" r="50" class="stagger-2" />
    <circle cx="600" cy="600" r="70" />
  </g>
  <rect width="1200" height="675" fill="url(#bgGlow)" class="reveal" />

  <g mask="url(#gridMask)" class="reveal" style="animation-delay: 0.5s;">
    <g fill="none" stroke="#b89354" stroke-width="0.5" opacity="0.15">
      <use href="#h1" /> <use href="#h2" /> <use href="#h3" /> <use href="#h4" /> <use href="#h5" />
      <use href="#v1" /> <use href="#v2" /> <use href="#v3" /> <use href="#v4" />
      <use href="#d1" /> <use href="#d2" /> <use href="#d3" />
    </g>
    <g fill="none" filter="url(#railGlow)" opacity="0.9">
      <use href="#h2" stroke="#f5d796" stroke-width="1.5" class="rail-fast stagger-1" />
      <use href="#h3" stroke="#ffffff" stroke-width="1.2" class="rail-slow stagger-2" />
      <use href="#h4" stroke="#f5d796" stroke-width="1" class="rail-fast" style="animation-delay: -0.5s;" />
      <use href="#v2" stroke="#ffffff" stroke-width="1" class="rail-slow stagger-1" />
      <use href="#v3" stroke="#f5d796" stroke-width="1.5" class="rail-fast stagger-3" />
      <use href="#d1" stroke="#f5d796" stroke-width="1.2" class="rail-diag" />
      <use href="#d2" stroke="#ffffff" stroke-width="1" class="rail-diag stagger-2" />
      <use href="#d3" stroke="#f5d796" stroke-width="1" class="rail-diag stagger-1" />
    </g>
  </g>
</svg>
