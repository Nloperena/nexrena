<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 400" style="width: 100%; height: auto;">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#1a1e28" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0c0f12" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mainLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a2a10"/>
      <stop offset="50%" stop-color="#b89354"/>
      <stop offset="100%" stop-color="#f5d796"/>
    </linearGradient>
    <linearGradient id="topFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0c0f12" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0c0f12" stop-opacity="0"/>
    </linearGradient>
    <path id="cfgTrack" d="M 340,320 C 280,280 220,260 180,220 C 140,180 200,140 260,120 C 320,100 400,110 460,140 C 520,170 560,210 580,260 C 600,310 520,340 440,330 C 380,322 360,330 340,320 Z" fill="none"/>
    <style>.node-glow{filter:drop-shadow(0 0 4px rgba(240,208,128,.5))}.head-glow{filter:drop-shadow(0 0 5px #fff)}</style>
  </defs>
  <rect width="680" height="400" fill="url(#bgGlow)"/>
  
  <!-- Thematic Background: Gears, Sliders, Settings -->
  <g opacity="0.25" fill="none" stroke="#7a5c2d" stroke-width="1.5">
    <!-- Gear 1 -->
    <g transform="translate(240, 180)">
      <circle cx="0" cy="0" r="40" />
      <circle cx="0" cy="0" r="15" />
      <!-- Teeth -->
      <path d="M-8,-40 L-12,-50 H12 L8,-40 M-8,40 L-12,50 H12 L8,40 M-40,-8 L-50,-12 V12 L-40,8 M40,-8 L50,-12 V12 L40,8" stroke-linejoin="round" />
      <path d="M-28,-28 L-35,-35 L-20,-42 L-15,-32 M28,28 L35,35 L20,42 L15,32 M-28,28 L-35,35 L-42,20 L-32,15 M28,-28 L35,-35 L42,-20 L32,-15" stroke-linejoin="round" />
    </g>
    
    <!-- Gear 2 -->
    <g transform="translate(340, 240)">
      <circle cx="0" cy="0" r="25" />
      <circle cx="0" cy="0" r="8" />
      <!-- Teeth -->
      <path d="M-6,-25 L-10,-35 H10 L6,-25 M-6,25 L-10,35 H10 L6,25 M-25,-6 L-35,-10 V10 L-25,6 M25,-6 L35,-10 V10 L25,6" stroke-linejoin="round" />
      <path d="M-18,-18 L-25,-25 L-10,-30 L-5,-22 M18,18 L25,25 L10,30 L5,22 M-18,18 L-25,25 L-30,10 L-22,5 M18,-18 L25,-25 L30,-10 L22,-5" stroke-linejoin="round" />
    </g>

    <!-- Sliders -->
    <rect x="420" y="110" width="140" height="120" rx="8" />
    <path d="M440,140 H540 M440,170 H540 M440,200 H540" stroke-width="4" opacity="0.5" stroke-linecap="round" />
    <circle cx="470" cy="140" r="8" fill="#7a5c2d" />
    <circle cx="510" cy="170" r="8" fill="#7a5c2d" />
    <circle cx="450" cy="200" r="8" fill="#7a5c2d" />
    
    <!-- Toggle Switches -->
    <rect x="440" y="250" width="40" height="20" rx="10" />
    <circle cx="450" cy="260" r="6" fill="#7a5c2d" />
    
    <rect x="500" y="250" width="40" height="20" rx="10" fill="#7a5c2d" fill-opacity="0.3" />
    <circle cx="530" cy="260" r="6" fill="#7a5c2d" />
  </g>

  <use href="#cfgTrack" stroke="#f5d796" stroke-width="10" opacity="0.06" stroke-linecap="round"/>
  <use href="#cfgTrack" stroke="#3a2a10" stroke-width="2" stroke-linecap="round"/>
  <use href="#cfgTrack" stroke="url(#mainLine)" stroke-width="2.5" stroke-linecap="round"/>
  <g>
    <circle cx="0" cy="0" r="3.5" fill="#fff" class="head-glow"><animateMotion dur="6s" repeatCount="indefinite"><mpath href="#cfgTrack"/></animateMotion></circle>
    <circle cx="0" cy="0" r="2" fill="#f5d796" opacity="0.5"><animateMotion dur="6s" begin="-0.4s" repeatCount="indefinite"><mpath href="#cfgTrack"/></animateMotion></circle>
  </g>
  <g transform="translate(340,200)">
    <circle cx="0" cy="0" r="36" fill="none" stroke="#b89354"><animate attributeName="r" values="24;44" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0" dur="2s" repeatCount="indefinite"/></circle>
    <circle cx="0" cy="0" r="18" fill="#0c0f12" stroke="#f0d080" stroke-width="2"/>
    <circle cx="0" cy="0" r="5" fill="#f0d080" class="node-glow"/>
  </g>
  <g transform="translate(220,160)"><circle cx="0" cy="0" r="10" fill="none" stroke="#b89354"><animate attributeName="r" values="6;16" dur="2s" begin="0.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0" dur="2s" begin="0.5s" repeatCount="indefinite"/></circle><circle cx="0" cy="0" r="5" fill="#0c0f12" stroke="#c9a050" stroke-width="1.2"/><circle cx="0" cy="0" r="1.4" fill="#f0d080" class="node-glow"/></g>
  <g transform="translate(460,240)"><circle cx="0" cy="0" r="10" fill="none" stroke="#b89354"><animate attributeName="r" values="6;16" dur="2s" begin="1s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.8;0" dur="2s" begin="1s" repeatCount="indefinite"/></circle><circle cx="0" cy="0" r="5" fill="#0c0f12" stroke="#c9a050" stroke-width="1.2"/><circle cx="0" cy="0" r="1.4" fill="#f0d080" class="node-glow"/></g>
  <rect width="680" height="40" fill="url(#topFade)"/>
</svg>